name: "Pull Request Labeler"
on:
  pull_request_target:

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
    - uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # ratchet:actions/labeler@v6.1.0
      with:
        repo-token: "${{ secrets.GITHUB_TOKEN }}"
        sync-labels: true
